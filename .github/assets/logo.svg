<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Conjure">
  <title>Conjure</title>
  <defs>
    <radialGradient id="void" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0205"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" fill="url(#void)"/>

  <!-- outer binding ring -->
  <circle cx="128" cy="128" r="112" fill="none" stroke="#8b0000" stroke-width="2"/>
  <circle cx="128" cy="128" r="104" fill="none" stroke="#8b0000" stroke-width="0.7" stroke-dasharray="1 3"/>

  <!-- inscribed inner ring -->
  <circle cx="128" cy="128" r="74" fill="none" stroke="#c41e3a" stroke-width="1.4" filter="url(#glow)"/>

  <!-- 4 layer sigils at compass points -->
  <g stroke="#c41e3a" stroke-width="1.8" fill="none" filter="url(#glow)">
    <!-- N : CLAUDE.md (open page) -->
    <path d="M118 28 L138 28 L138 42 L128 47 L118 42 Z"/>
    <line x1="128" y1="28" x2="128" y2="44"/>
    <!-- E : Skills (stacked layers) -->
    <line x1="216" y1="120" x2="232" y2="120"/>
    <line x1="216" y1="128" x2="232" y2="128"/>
    <line x1="216" y1="136" x2="232" y2="136"/>
    <!-- S : Subagents (triangle = isolated) -->
    <path d="M118 212 L138 212 L128 230 Z"/>
    <!-- W : Hooks (hook curve) -->
    <path d="M40 120 Q24 128 40 136" stroke-width="2.2"/>
  </g>

  <!-- central glyph: C bound by chain bar -->
  <g fill="none" filter="url(#glow)">
    <path d="M158 96 Q96 96 96 128 Q96 160 158 160"
          stroke="#c41e3a" stroke-width="7" stroke-linecap="round"/>
    <line x1="80" y1="128" x2="172" y2="128"
          stroke="#8b0000" stroke-width="5" stroke-linecap="round"/>
    <circle cx="80" cy="128" r="4" fill="#8b0000"/>
    <circle cx="172" cy="128" r="4" fill="#8b0000"/>
  </g>

  <!-- 4 corner inscriptions -->
  <g fill="#8b0000" opacity="0.65" font-family="Georgia, serif" font-size="11" text-anchor="middle">
    <text x="128" y="18">✦</text>
    <text x="244" y="132">✦</text>
    <text x="128" y="248">✦</text>
    <text x="12" y="132">✦</text>
  </g>
</svg>
